name: Deploy web demo to Pages

# Build the SvelteKit demo (wasm-pack the checker, bake in the integrity manifest from the latest
# artifact Release) and deploy to GitHub Pages. The manifest's hashes are produced alongside the
# released bytes (see release-artifacts.yml), so the deployed root of trust matches what it fetches.

on:
  push:
    branches: [master]
    # `crates/**` because the wasm bundle compiles the whole engine (rlt-core/native/convert/…), so an
    # engine change must redeploy even though only rlt-wasm is the direct entry point.
    paths: ["web/**", "crates/**", ".github/workflows/deploy-pages.yml"]
  workflow_dispatch:
    inputs:
      artifact-tag:
        description: Artifact Release tag to pin (blank = latest artifacts-*)
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust
        with: { targets: wasm32-unknown-unknown, cache-key: deploy-pages }
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: pnpm/action-setup@v6
        with: { version: 10 }
      - uses: actions/setup-node@v6
        with: { node-version: 20, cache: pnpm, cache-dependency-path: web/pnpm-lock.yaml }

      - name: Resolve the artifact Release tag
        id: art
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.event.inputs.artifact-tag }}"
          if [ -z "$tag" ]; then
            tag=$(gh api "repos/${{ github.repository }}/releases" \
              --jq '[.[] | select(.tag_name | startswith("artifacts-"))][0].tag_name')
          fi
          [ -z "$tag" ] && { echo "no artifacts-* release found — run release-artifacts.yml first"; exit 1; }
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Using artifact release: $tag"

      # Bake BOTH the manifest and the gzipped artifacts into the site so they're served same-origin.
      # GitHub Release asset downloads send no `Access-Control-Allow-Origin`, so fetching them cross-origin
      # from the Pages site is CORS-blocked; serving them from Pages itself (default ARTIFACT_BASE_URL =
      # `${base}/artifacts`) avoids that. The integrity manifest still gates every download.
      - name: Bake the artifacts + integrity manifest into the site
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web/static/artifacts
          gh release download "${{ steps.art.outputs.tag }}" \
            --repo "${{ github.repository }}" --dir web/static/artifacts --clobber
          mv web/static/artifacts/web-artifacts.json web/static/web-artifacts.json

      - run: pnpm --prefix web install --frozen-lockfile

      - name: Build the static site
        env:
          BASE_PATH: /${{ github.event.repository.name }}
        run: pnpm --prefix web run build

      - uses: actions/upload-pages-artifact@v5
        with: { path: web/build }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
