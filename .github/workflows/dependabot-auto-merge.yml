name: Dependabot auto-merge

# Hands-off dependency hygiene: when Dependabot opens a PR, enable auto-merge so GitHub squash-merges it
# once the required CI checks (ci.yml: lint/test/wasm/web/engine-oracle, enforced by branch protection)
# go green. Major version bumps are left for manual review — they're the ones likely to need code changes.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (non-major)
        if: steps.meta.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
